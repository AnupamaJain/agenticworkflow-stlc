name: AI-QEF CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # nightly real-LLM smoke test

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/test_guardrails.py tests/test_llm_guardrail_reviewer.py tests/test_executor.py -v

  guardrail-eval:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run guardrail regression eval suite
        run: python evaluation/run_evals.py --suite guardrail --fail-under 0.90

  agentic-demo-run:
    runs-on: ubuntu-latest
    needs: guardrail-eval
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run full agentic STLC demo (FakeLLMClient, mock Selenium MCP)
        run: python langgraph_agent/graph.py
      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentic-stlc-run-${{ github.sha }}
          path: |
            demo/sample_run/execution_log.json
            demo/sample_run/bug_report.md
            demo/sample_run/mcp_audit_log.json

  real-llm-smoke-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies (incl. real MCP/Selenium)
        run: |
          pip install -r requirements.txt
          pip install mcp anthropic selenium
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Run real-LLM demo against sandbox
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python langgraph_agent/graph.py --real-llm --target-env sandbox
